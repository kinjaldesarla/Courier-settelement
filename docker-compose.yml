services:
  mongo:
    image: mongo:7
    container_name: courier_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: courier_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: courier_backend
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/courier
      - REDIS_URL=redis://redis:6379
      - RECONCILIATION_CRON=0 2 * * *   # 2:00 AM
      - RECONCILIATION_TZ=Asia/Kolkata
      - SEED_ON_START=false
      - AUTO_RECONCILE_ON_START=true
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis
    command: sh -lc "node src/index.js"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: courier_worker
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/courier
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_API_URL=http://notification-api:5050/notify
    depends_on:
      - mongo
      - redis
    command: sh -lc "node src/index.js"

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: courier_scheduler
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/courier
      - REDIS_URL=redis://redis:6379
      - RECONCILIATION_CRON=0 2 * * *   # 2:00 AM
      - RECONCILIATION_TZ=Asia/Kolkata
    depends_on:
      - mongo
      - redis
    command: sh -lc "node src/index.js"

  notification-api:
    build:
      context: .
      dockerfile: tools/mock-notification-api/Dockerfile
    container_name: courier_notification_api
    ports:
      - "5050:5050"
    command: sh -lc "node src/index.js"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: courier_frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -lc "npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  mongo_data:

